services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: dashboard-confitec:latest
    container_name: dashboard-confitec
    ports:
      # Host:Container — usamos 8081 no host para não colidir com http-server local em 8080
      - "8081:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
