server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão para CSS, JS e SVG — reduz transferência ~70% em arquivos texto
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # MIME types vêm do mime.types padrão do nginx (incluído no nginx.conf base):
    # .js → application/javascript, .css → text/css, .svg → image/svg+xml, etc.
    # Não redefinir o bloco `types {}` aqui — isso sobrescreveria a tabela padrão.

    # HTML também sem cache: ele é o entry point que referencia main.js
    # com o cache busting. Se o HTML estiver cacheado, o ?v= não muda.
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # ES Modules: subimports não respeitam o cache-busting do entry point.
    # Para a aplicação ser sempre atualizada sem precisar de janela anônima,
    # marcamos JS/CSS como no-cache. Assets binários (fonts, imgs) podem cachear.
    location ~* \.(js|mjs|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }
    location ~* \.(woff2|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # Header de segurança básico — evita que o dashboard seja embedado em iframes
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA-style fallback (não há rotas client-side hoje, mas previne 404 em recargas futuras)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
